name: Publish Yusr Core Abstractions

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Needed for versioning tools

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        # This automatically sets up the auth for GitHub Packages
        source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and Pack
      # We use the GitHub Run Number to create a unique version (e.g., 1.0.5)
      run: |
        dotnet pack --configuration Release \
        -p:PackageVersion=1.0.${{ github.run_number }} \
        --output ./nupkg

    - name: Push to GitHub Packages
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GH_PACKAGES_TOKEN }} --source "GitHub" --skip-duplicate
